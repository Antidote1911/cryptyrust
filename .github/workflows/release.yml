name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Linux AppImage ─────────────────────────────────────────────────────────
  build-linux:
    name: Build – Linux x86_64 (AppImage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          v="${{ github.ref_name }}"
          echo "VERSION=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Download linuxdeploy
        run: |
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage" \
            -O linuxdeploy
          chmod +x linuxdeploy

      - name: Build AppImage (linuxdeploy bundle les .so)
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
          OUTPUT: cryptyrust-${{ steps.version.outputs.VERSION }}-linux.AppImage
        run: |
          ./linuxdeploy \
            --appdir AppDir \
            --executable target/release/cryptyrust \
            --executable target/release/cryptyrust_cli \
            --desktop-file packaging/linux/cryptyrust.desktop \
            --icon-file packaging/cryptyrust.png \
            --output appimage

      - uses: actions/upload-artifact@v4
        with:
          name: cryptyrust-linux-appimage
          path: cryptyrust-${{ steps.version.outputs.VERSION }}-linux.AppImage

  # ── macOS Universal DMG ────────────────────────────────────────────────────
  build-macos:
    name: Build – macOS Universal (DMG)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          v="${{ github.ref_name }}"
          echo "VERSION=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: macos-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: macos-cargo-

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binaries
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/cryptyrust_cli \
            target/aarch64-apple-darwin/release/cryptyrust_cli \
            -output dist/cryptyrust_cli
          lipo -create \
            target/x86_64-apple-darwin/release/cryptyrust \
            target/aarch64-apple-darwin/release/cryptyrust \
            -output dist/cryptyrust

      - name: PNG → .icns (outils natifs macOS)
        run: |
          mkdir -p cryptyrust.iconset
          sips -z 16   16   packaging/cryptyrust.png --out cryptyrust.iconset/icon_16x16.png
          sips -z 32   32   packaging/cryptyrust.png --out cryptyrust.iconset/icon_16x16@2x.png
          sips -z 32   32   packaging/cryptyrust.png --out cryptyrust.iconset/icon_32x32.png
          sips -z 64   64   packaging/cryptyrust.png --out cryptyrust.iconset/icon_32x32@2x.png
          sips -z 128  128  packaging/cryptyrust.png --out cryptyrust.iconset/icon_128x128.png
          sips -z 256  256  packaging/cryptyrust.png --out cryptyrust.iconset/icon_128x128@2x.png
          sips -z 256  256  packaging/cryptyrust.png --out cryptyrust.iconset/icon_256x256.png
          sips -z 512  512  packaging/cryptyrust.png --out cryptyrust.iconset/icon_256x256@2x.png
          sips -z 512  512  packaging/cryptyrust.png --out cryptyrust.iconset/icon_512x512.png
          cp cryptyrust.iconset/icon_512x512.png cryptyrust.iconset/icon_512x512@2x.png
          iconutil -c icns cryptyrust.iconset -o cryptyrust.icns

      - name: Create .app bundle
        run: |
          mkdir -p "Cryptyrust.app/Contents/MacOS"
          mkdir -p "Cryptyrust.app/Contents/Resources"
          cp dist/cryptyrust              "Cryptyrust.app/Contents/MacOS/cryptyrust"
          cp dist/cryptyrust_cli          "Cryptyrust.app/Contents/MacOS/cryptyrust_cli"
          cp cryptyrust.icns              "Cryptyrust.app/Contents/Resources/cryptyrust.icns"
          cp packaging/macos/Info.plist   "Cryptyrust.app/Contents/Info.plist"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir dmg-staging
          cp -r "Cryptyrust.app" dmg-staging/
          create-dmg \
            --volname "Cryptyrust" \
            --volicon "cryptyrust.icns" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "Cryptyrust.app" 180 170 \
            --hide-extension "Cryptyrust.app" \
            --app-drop-link 480 170 \
            "cryptyrust-${{ steps.version.outputs.VERSION }}-macos-universal.dmg" \
            "dmg-staging/"

      - uses: actions/upload-artifact@v4
        with:
          name: cryptyrust-macos-dmg
          path: cryptyrust-${{ steps.version.outputs.VERSION }}-macos-universal.dmg

  # ── Windows portable + installer ──────────────────────────────────────────
  build-windows:
    name: Build – Windows x86_64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build release binaries
        run: cargo build --release

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}" -replace '^v', ''
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package portable ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\cryptyrust.exe     dist\
          Copy-Item target\release\cryptyrust_cli.exe dist\
          Compress-Archive -Path dist\* -DestinationPath "cryptyrust-${{ steps.version.outputs.VERSION }}-win-portable.zip"

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          Copy-Item target\release\cryptyrust.exe     packaging\windows\
          Copy-Item target\release\cryptyrust_cli.exe packaging\windows\
          Copy-Item gui\assets\icon.ico               packaging\windows\
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DVERSION=${{ steps.version.outputs.VERSION }} packaging\windows\installer.iss
          Move-Item packaging\windows\Output\cryptyrust-windows-setup.exe "cryptyrust-${{ steps.version.outputs.VERSION }}-win-setup.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: cryptyrust-windows-portable
          path: cryptyrust-${{ steps.version.outputs.VERSION }}-win-portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: cryptyrust-windows-setup
          path: cryptyrust-${{ steps.version.outputs.VERSION }}-win-setup.exe

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          v="${{ github.ref_name }}"
          echo "VERSION=${v#v}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cryptyrust-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cryptyrust-${{ steps.version.outputs.VERSION }}-linux.AppImage
            cryptyrust-${{ steps.version.outputs.VERSION }}-macos-universal.dmg
            cryptyrust-${{ steps.version.outputs.VERSION }}-win-portable.zip
            cryptyrust-${{ steps.version.outputs.VERSION }}-win-setup.exe
            arsenic/FORMAT.md
            README.md
            arsenic_V1.html
          generate_release_notes: true
