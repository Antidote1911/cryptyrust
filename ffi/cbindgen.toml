# cbindgen configuration for arsenic_ffi
# Usage: cbindgen --config ffi/cbindgen.toml --crate arsenic_ffi --output cryptyrust.h

language = "C"
include_guard = "CRYPTYRUST_H"
autogen_warning = "/* Auto-generated by cbindgen — do not edit manually */"
tab_width = 4
# Wrap declarations in extern "C" { } when included from C++ code
cpp_compat = true

# Emit Doxygen-style comments from Rust doc-comments
documentation = true
documentation_style = "doxy"

# Use C99 fixed-width types
[parse]
parse_deps = false

[export]
# Only export items explicitly marked #[no_mangle] pub extern "C"
include = [
    "ArsBuffer",
    "ArsParams",
    "ArsProgressFn",
    "ArsBenchResult",
    "ArsBenchArray",
    "ARSENIC_OK",
    "ARSENIC_ERR_DECRYPT",
    "ARSENIC_ERR_IO",
    "ARSENIC_ERR_PARAMS",
    "ARSENIC_ERR_BAD_MAGIC",
    "ARSENIC_ERR_NULL_PTR",
    "ARSENIC_ERR_UNKNOWN",
]
